<html>
<head>
<title>Blood Group Validation</title>
<h2> Blood Group </h2>
</head>

<script>
function validateBlood(){
    var b = document.getElementById("blood").value;
    if(b==""){
        alert("Select blood group");
        return false;
    }
    alert("Blood group selected");
    return true;
}
</script>
<body>
<form onsubmit="return validateBlood()">
<select id="blood">
<option value="">Select</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
<option>O+</option>
<option>O-</option>
</select>
<br>
<input type="submit">
</form>
</body>
</html>
