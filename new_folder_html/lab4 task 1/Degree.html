<!DOCTYPE html>
<html>
<head>
</head>
<script>
function validateDegree()
{
    var s = document.getElementById("ssc").checked;
    var h = document.getElementById("hsc").checked;
    var b = document.getElementById("bsc").checked;
    if(!s && !h && !b)
    {
        alert("Select degree");
        return false;
    }
    alert("Degree Selected");
    return true;
}
</script>
<body>
<form onsubmit="return validateDegree()">
<input type="checkbox" id="ssc"> SSC
<input type="checkbox" id="hsc"> HSC
<input type="checkbox" id="bsc"> BSc
<br>
<input type="submit">
</form>
</body>
</html>
