<!DOCTYPE html>
<html>
<head>
<title>Gender Validation</title>
</head>
<script>
function validateGender()
{
    var m = document.getElementById("male").checked;
    var f = document.getElementById("female").checked;
    if(!m && !f)
    {
        alert("Select gender");
        return false;
    }
    alert("Gender Selected");
    return true;
}
</script>
<body>
<form onsubmit="return validateGender()">
<input type="radio" id="male" name="gender"> Male
<input type="radio" id="female" name="gender"> Female
<br>
<input type="submit">
</form>
</body>
</html>
