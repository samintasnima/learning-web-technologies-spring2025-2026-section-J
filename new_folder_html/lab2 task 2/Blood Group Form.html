<html>
<head>
    <title>Blood Group Form</title>
</head>
<body>
    <form>
        <label>Blood Group</label>
        <select name="bloodgroup">
            <option value="a+">A+</option>
            <option value="a-">A-</option>
            <option value="b+">B+</option>
            <option value="b-">B-</option>
            <option value="o+">O+</option>
            <option value="o-">O-</option>
            <option value="ab+">AB+</option>
            <option value="ab-">AB-</option>
        </select><br><br>
        <input type="submit" value="Submit">
    </form>
</body>
</html>
